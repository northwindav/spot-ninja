name: Build WindNinja Docker Image

on:
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push to container registry (requires secrets set up)'
        required: false
        default: 'false'
  push:
    branches:
      - main
      - master
    paths:
      - 'docker/Dockerfile'
      - '.github/workflows/docker-build.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: windninja
  IMAGE_TAG: latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Spot-Ninja Repository
        uses: actions/checkout@v4

      - name: Clone WindNinja Source
        run: |
          git clone https://github.com/firelab/windninja.git windninja_source
          echo "WindNinja source cloned successfully"
          ls -la windninja_source | head -20

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: windninja_source
          file: ./docker/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=/tmp/windninja-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windninja-docker-image
          path: /tmp/windninja-image.tar
          retention-days: 30
          if-no-files-found: error

      - name: Log in to Container Registry
        if: github.event.inputs.push_to_registry == 'true' || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Container Registry
        if: github.event.inputs.push_to_registry == 'true' || github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: windninja_source
          file: ./docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Build Summary
        run: |
          cat > /tmp/BUILD_INFO.txt << 'EOF'
          ==========================================
          WindNinja Docker Image Build Complete
          ==========================================
          
          Image Name: ${{ env.IMAGE_NAME }}
          Tag: ${{ env.IMAGE_TAG }}
          Build Date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          Build Matrix:
            - OS: Ubuntu Latest
            - Architecture: x86_64
            - Base Image: Ubuntu 20.04
          
          BUILD ARTIFACT INFORMATION:
          - Artifact Name: windninja-docker-image
          - Format: TAR (loadable with: docker load)
          - Retention: 30 days
          - Location: GitHub Actions Artifacts
          
          NEXT STEPS (Local):
          1. Download artifact from GitHub Actions page
          2. Load image: docker load -i windninja-image.tar
          3. Verify: docker images | grep windninja
          4. Run: docker run -v $(pwd)/data:/data windninja:latest windninja /data/config.sta
          
          CONTAINER REGISTRY (if push enabled):
          ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          Pull: docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
          Build Configuration: See docker/Dockerfile
          
          ==========================================
          EOF
          cat /tmp/BUILD_INFO.txt

      - name: Upload Build Info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: /tmp/BUILD_INFO.txt
          retention-days: 30
